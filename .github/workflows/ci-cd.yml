name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Spring Boot)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: E-Commerce-Backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret-32-chars-minimum!!' }}
        run: mvn clean package -DskipTests -q

      - name: Run tests
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret-32-chars-minimum!!' }}
        run: mvn test -q
        continue-on-error: true

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: E-Commerce-Backend/target/*.jar

  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: E-Commerce-Frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: E-Commerce-Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --silent

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: E-Commerce-Frontend/dist/

  ai-service:
    name: AI Service (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8 --quiet
          flake8 . --count --max-line-length=120 --statistics --exclude=.venv,venv
        continue-on-error: true

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend, ai-service]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./E-Commerce-Backend
          push: false
          tags: eco-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./E-Commerce-Frontend
          push: false
          tags: eco-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build ai-service image
        uses: docker/build-push-action@v5
        with:
          context: ./ai-service
          push: false
          tags: eco-ai-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
