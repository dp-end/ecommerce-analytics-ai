<div class="register-page">
  <div class="register-container">
    <!-- Logo -->
    <div class="brand-logo site-logo">
      <img src="eco-logo.png" alt="ECO" class="logo-img">
      <span class="brand-name">ECO</span>
    </div>

    <div class="form-header">
      <h1 class="form-title">Hesap Oluştur</h1>
      <p class="form-subtitle">ECO'ya hemen üye olun</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="register-form">
      <!-- Name -->
      <div class="form-group">
        <label class="form-label">Ad Soyad</label>
        <input
          type="text"
          class="form-control"
          [value]="name()"
          (input)="name.set($any($event.target).value)"
          placeholder="Adınız ve soyadınız"
        />
      </div>

      <!-- Email -->
      <div class="form-group">
        <label class="form-label">E-posta Adresi</label>
        <input
          type="email"
          class="form-control"
          [value]="email()"
          (input)="email.set($any($event.target).value)"
          placeholder="ornek@email.com"
        />
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="form-label">Şifre</label>
        <input
          type="password"
          class="form-control"
          [value]="password()"
          (input)="password.set($any($event.target).value)"
          placeholder="En az 6 karakter"
        />
      </div>

      @if (error()) {
        <div class="error-alert">
          <span>⚠️</span> {{ error() }}
        </div>
      }

      <button type="submit" class="btn btn-primary btn-lg submit-btn" [disabled]="loading()">
        @if (loading()) {
          <span class="spinner"></span> Hesap Oluşturuluyor...
        } @else {
          Üye Ol
        }
      </button>
    </form>

    <div class="form-footer">
      <span>Zaten üye misiniz?</span>
      <a routerLink="/login" class="login-link">Giriş Yap</a>
    </div>
  </div>
</div>
