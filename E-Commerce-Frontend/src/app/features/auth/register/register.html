<div class="register-page">
  <div class="register-container">
    <!-- Logo -->
    <div class="brand-logo">
      <div class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M3 3v18h18" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M7 16l4-4 4 4 4-8" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="brand-name">DataPulse</span>
    </div>

    <div class="form-header">
      <h1 class="form-title">Hesap Oluştur</h1>
      <p class="form-subtitle">DataPulse'a hemen üye olun</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="register-form">
      <!-- Rol Seçimi -->
      <div class="role-selector">
        <button type="button" class="role-card" [class.active]="roleType() === 'INDIVIDUAL'"
          (click)="roleType.set('INDIVIDUAL')">
          <span class="role-icon">🛒</span>
          <span class="role-label">Bireysel</span>
          <span class="role-desc">Alışveriş yapın</span>
        </button>
        <button type="button" class="role-card" [class.active]="roleType() === 'CORPORATE'"
          (click)="roleType.set('CORPORATE')">
          <span class="role-icon">🏪</span>
          <span class="role-label">Kurumsal</span>
          <span class="role-desc">Mağaza açın</span>
        </button>
      </div>

      <!-- Name -->
      <div class="form-group">
        <label class="form-label">Ad Soyad</label>
        <input
          type="text"
          class="form-control"
          [value]="name()"
          (input)="name.set($any($event.target).value)"
          placeholder="Adınız ve soyadınız"
        />
      </div>

      <!-- Email -->
      <div class="form-group">
        <label class="form-label">E-posta Adresi</label>
        <input
          type="email"
          class="form-control"
          [value]="email()"
          (input)="email.set($any($event.target).value)"
          placeholder="ornek@email.com"
        />
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="form-label">Şifre</label>
        <input
          type="password"
          class="form-control"
          [value]="password()"
          (input)="password.set($any($event.target).value)"
          placeholder="En az 6 karakter"
        />
      </div>

      @if (error()) {
        <div class="error-alert">
          <span>⚠️</span> {{ error() }}
        </div>
      }

      <button type="submit" class="btn btn-primary btn-lg submit-btn" [disabled]="loading()">
        @if (loading()) {
          <span class="spinner"></span> Hesap Oluşturuluyor...
        } @else {
          Üye Ol
        }
      </button>
    </form>

    <div class="form-footer">
      <span>Zaten üye misiniz?</span>
      <a routerLink="/login" class="login-link">Giriş Yap</a>
    </div>
  </div>
</div>
