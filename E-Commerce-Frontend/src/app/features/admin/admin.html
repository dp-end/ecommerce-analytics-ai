<div class="shell-layout">
  <app-sidebar role="admin" />
  <div class="shell-main">
    <app-navbar [pageTitle]="'Admin Panel'" />
    <main class="shell-content">
      <router-outlet />
    </main>
  </div>
</div>

<style>
  .shell-layout {
    display: flex;
    min-height: 100vh;
    background: var(--bg-primary);
  }

  .shell-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .shell-content {
    flex: 1;
    padding: 1.75rem;
    overflow-y: auto;
  }

  @media (max-width: 768px) {
    .shell-layout {
      display: block;
    }

    .shell-main {
      width: 100%;
    }

    .shell-content {
      padding: 1rem;
    }
  }

  @media (max-width: 480px) {
    .shell-content {
      padding: 0.75rem;
    }
  }
</style>
