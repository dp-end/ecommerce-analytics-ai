<header class="navbar">
  <!-- Page Title -->
  <div class="navbar-left">
    <h1 class="page-title">{{ pageTitle }}</h1>
  </div>

  <!-- Center: Search -->
  <div class="navbar-center">
    <div class="search-wrapper">
      <svg class="search-icon-svg" width="16" height="16" viewBox="0 0 24 24" fill="none">
        <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
        <path d="m21 21-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <input
        type="text"
        class="search-input"
        placeholder="Search anything..."
        [ngModel]="searchQuery()"
        (ngModelChange)="searchQuery.set($event)"
        (keyup.enter)="submitSearch()"
      />
      <kbd class="search-kbd">⌘K</kbd>
    </div>
  </div>

  <!-- Right: Notifications & User -->
  <div class="navbar-right">
    <!-- Notifications -->
    <div class="notif-container">
      <button class="icon-btn" (click)="toggleNotifications()" title="Notifications">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        @if (unreadCount() > 0) {
          <span class="notif-badge">{{ unreadCount() }}</span>
        }
      </button>

      @if (showNotifications()) {
        <div class="notif-dropdown">
          <div class="notif-header">
            <span class="notif-title">Notifications</span>
            <button class="notif-mark-read" (click)="markAllRead()">Mark all read</button>
          </div>
          <div class="notif-list">
            @for (notif of notifications(); track notif.id) {
              <div class="notif-item" [class.unread]="!notif.read" (click)="markNotificationRead(notif.id)">
                <div class="notif-dot" [class.visible]="!notif.read"></div>
                <div class="notif-content">
                  <div class="notif-text">{{ notif.text }}</div>
                  <div class="notif-time">{{ notif.time }}</div>
                </div>
              </div>
            }
          </div>
        </div>
      }
    </div>

    <!-- Divider -->
    <div class="navbar-divider"></div>

    <!-- User -->
    <div class="user-section">
      <div class="user-avatar-nav">{{ getInitials() }}</div>
      <div class="user-details">
        <div class="user-name-nav">{{ user()?.name }}</div>
        <span class="badge" [ngClass]="getRoleBadgeClass()">{{ getRoleLabel() }}</span>
      </div>
    </div>
  </div>
</header>
