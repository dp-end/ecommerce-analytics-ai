<div class="sidebar-overlay" (click)="closeMobileMenu()"></div>
<aside class="sidebar">
  <!-- Logo -->
  <div class="sidebar-logo">
    <div class="site-logo">
      <div class="logo-icon">
        <span class="logo-pulse"></span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M3 3v18h18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M7 16l4-4 4 4 4-8" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="logo-text">DataPulse</span>
    </div>
  </div>

  <!-- Nav Items -->
  <nav class="sidebar-nav">
    <ul>
      @for (item of navItems(); track item.route) {
        <li>
          <a
            [routerLink]="item.route"
            routerLinkActive="active"
            class="nav-item"
            (click)="closeMobileMenu()"
          >
            <span class="nav-icon">{{ item.icon }}</span>
            <span class="nav-label">{{ item.label }}</span>
            <span class="nav-indicator"></span>
          </a>
        </li>
      }
    </ul>
  </nav>

  <!-- User & Logout -->
  <div class="sidebar-footer">
    <div class="sidebar-user">
      <div class="user-avatar">{{ getInitials() }}</div>
      <div class="user-info">
        <div class="user-name">{{ user()?.name }}</div>
        <div class="user-email">{{ user()?.email }}</div>
      </div>
    </div>
    <button class="logout-btn" (click)="logout()" title="Sign out">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <polyline points="16 17 21 12 16 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="21" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
</aside>
