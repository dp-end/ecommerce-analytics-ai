spring.application.name=AdvancedProject
server.port=8080

# ─── Database ───────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_db?serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=abc1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── JWT ────────────────────────────────────────────────────────────────────
jwt.secret=3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b
jwt.expiration=86400000

# ─── Swagger / OpenAPI ──────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ─── AI Chatbot (Gemini) ────────────────────────────────────────────────────
ai.gemini.api-key="YOUR_GEMINI_API_KEY_HERE"
ai.gemini.model=gemini-1.5-flash

# ─── Logging ────────────────────────────────────────────────────────────────
logging.level.org.springframework.security=DEBUG
logging.level.com.E_Commerce=DEBUG
