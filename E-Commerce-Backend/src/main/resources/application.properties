spring.application.name=AdvancedProject
server.port=8080

# ─── Load .env file (put your API keys here) ────────────────────────────────
# Edit E-Commerce-Backend/.env  — Spring Boot reads it automatically.
spring.config.import=optional:file:.env[.properties]

# ─── Database Profile ───────────────────────────────────────────────────────
# Set DB_TYPE=mysql (default) or DB_TYPE=postgresql to switch databases.
# The chosen profile loads application-{mysql|postgresql}.properties.
spring.profiles.active=${DB_TYPE:mysql}

# ─── JPA / Hibernate (common) ───────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true

# ─── JWT ────────────────────────────────────────────────────────────────────
# JWT_SECRET must be set explicitly (min 32 chars). No insecure default.
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}

# ─── Swagger / OpenAPI ──────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ─── AI Chatbot (Gemini — fallback) ─────────────────────────────────────────
# Key is loaded from .env  →  GEMINI_API_KEY=your_key_here
ai.gemini.api-key=${GEMINI_API_KEY:}
ai.gemini.model=gemini-2.0-flash-lite

# ─── Python LangGraph AI Service (primary) ───────────────────────────────────
# Start with: uvicorn api:app --port 8000  (inside ai-service/)
# Set AI_SERVICE_ENABLED=false to skip and go straight to Gemini fallback.
ai.service.url=${AI_SERVICE_URL:http://127.0.0.1:8000}
ai.service.enabled=${AI_SERVICE_ENABLED:true}
ai.service.internal-secret=${INTERNAL_SERVICE_SECRET:}

# ─── Upload Size ────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB
server.tomcat.max-http-form-post-size=15MB
server.tomcat.max-swallow-size=-1

# ─── Stripe ─────────────────────────────────────────────────────────────────
# Set real keys in .env: STRIPE_API_KEY=sk_test_... and STRIPE_WEBHOOK_SECRET=whsec_...
stripe.api.key=${STRIPE_API_KEY:}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:}

# ─── Logging ────────────────────────────────────────────────────────────────
logging.level.org.springframework.security=${SPRING_SECURITY_LOG_LEVEL:INFO}
logging.level.com.E_Commerce=${APP_LOG_LEVEL:INFO}
