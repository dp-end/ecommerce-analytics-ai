spring.application.name=AdvancedProject
server.port=8080

# ─── Database Profile ───────────────────────────────────────────────────────
# Set DB_TYPE=mysql (default) or DB_TYPE=postgresql to switch databases.
# The chosen profile loads application-{mysql|postgresql}.properties.
spring.profiles.active=${DB_TYPE:mysql}

# ─── JPA / Hibernate (common) ───────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── JWT ────────────────────────────────────────────────────────────────────
jwt.secret=3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b
jwt.expiration=86400000

# ─── Swagger / OpenAPI ──────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ─── AI Chatbot (Gemini — fallback) ─────────────────────────────────────────
ai.gemini.api-key=AIzaSyCRAQUWCg_LJQV6vmytMT9VV06IL8NMj_s
ai.gemini.model=gemini-2.0-flash-lite

# ─── Python LangGraph AI Service (primary) ───────────────────────────────────
# Start with: uvicorn api:app --port 8000  (inside ai-service/)
# Set AI_SERVICE_ENABLED=false to skip and go straight to Gemini fallback.
ai.service.url=${AI_SERVICE_URL:http://localhost:8000}
ai.service.enabled=${AI_SERVICE_ENABLED:true}

# ─── Upload Size ────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB
server.tomcat.max-http-form-post-size=15MB
server.tomcat.max-swallow-size=-1

# ─── Logging ────────────────────────────────────────────────────────────────
logging.level.org.springframework.security=DEBUG
logging.level.com.E_Commerce=DEBUG
