services:
  mysql:
    image: mysql:8.0
    container_name: eco_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: ecommerce_db
      MYSQL_USER: eco
      MYSQL_PASSWORD: ecopass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - eco_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ueco", "-pecopass"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./E-Commerce-Backend
      dockerfile: Dockerfile
    container_name: eco_backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_TYPE: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ecommerce_db
      DB_USERNAME: eco
      DB_PASSWORD: ecopass

      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ecommerce_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: eco
      SPRING_DATASOURCE_PASSWORD: ecopass

      JWT_SECRET: ${JWT_SECRET:-this_is_a_long_default_jwt_secret_key_123456789}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-3600000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}

      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      AI_SERVICE_URL: http://ai-service:8000
      AI_SERVICE_ENABLED: ${AI_SERVICE_ENABLED:-true}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-internal_secret_123456}

      STRIPE_API_KEY: ${STRIPE_API_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    ports:
      - "8080:8080"
    networks:
      - eco_net

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: eco_ai
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ecommerce_db
      DB_USERNAME: eco
      DB_PASSWORD: ecopass
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-internal_secret_123456}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - eco_net

  frontend:
    build:
      context: ./E-Commerce-Frontend
      dockerfile: Dockerfile
    container_name: eco_frontend
    depends_on:
      - backend
    ports:
      - "4200:80"
    networks:
      - eco_net

volumes:
  mysql_data:

networks:
  eco_net:
    driver: bridge
